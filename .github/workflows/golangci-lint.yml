name: golangci-lint
on:
  push:
    tags:
      - v*
    branches:
      - master
  pull_request:

permissions:
  contents: read
  pull-requests: read


jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
        uses: actions/checkout@v6.0.2
        uses: actions/setup-go@v6.3.0
        with:
          go-version: stable
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9.2.1

